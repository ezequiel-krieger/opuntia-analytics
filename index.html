<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Opuntia Data-Driven | Master Intelligence</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f1f5f9; margin: 0; }
        .card { background: white; border-radius: 1rem; box-shadow: 0 4px 12px -2px rgba(0,0,0,0.08); border: 1px solid #e2e8f0; }
        .metric-card { border-top: 6px solid #10b981; }
        select { cursor: pointer; border: 1px solid #cbd5e1; border-radius: 0.5rem; padding: 0.7rem; font-weight: 700; color: #334155; width: 100%; background-color: #f8fafc; appearance: none; height: 48px; }
        select:focus { ring: 2px solid #10b981; outline: none; border-color: #10b981; }
        .chart-container { position: relative; height: 480px; width: 100%; min-height: 400px; }
        .radio-box { transition: all 0.2s; border-width: 2px; border-color: #e2e8f0; }
        .radio-box.active { border-color: #2563eb; background-color: #eff6ff; color: #1e3a8a; }
    </style>
</head>
<body class="text-slate-800 antialiased min-h-screen flex flex-col">

    <header class="bg-slate-900 text-white py-6 shadow-2xl border-b-4 border-emerald-500">
        <div class="max-w-7xl mx-auto px-6 flex flex-col md:flex-row justify-between items-center w-full gap-4">
            <div class="text-center md:text-left">
                <h1 class="text-3xl font-black tracking-tighter text-emerald-400 italic uppercase tracking-widest">Opuntia <span class="text-white not-italic">Data-Driven</span></h1>
                <p class="text-[10px] text-slate-400 mt-1 uppercase tracking-[0.3em] font-bold text-emerald-500">Master Agriculture Intelligence</p>
            </div>
            <div class="bg-emerald-500/10 border border-emerald-500/30 px-5 py-2 rounded-full flex items-center gap-3">
                <i data-lucide="database" class="w-4 h-4 text-emerald-400"></i>
                <span class="text-sm font-mono font-black text-emerald-400 uppercase tracking-widest">n = 200 Registros</span>
            </div>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-6 py-8 grid grid-cols-1 lg:grid-cols-12 gap-8 flex-grow w-full">
        <div class="lg:col-span-4 flex flex-col gap-6">
            <section class="card p-6 border-l-8 border-l-emerald-600">
                <div class="flex items-center gap-3 mb-6 border-b border-slate-100 pb-3">
                    <i data-lucide="filter" class="w-5 h-5 text-emerald-600"></i>
                    <h2 class="text-sm font-black text-slate-500 uppercase tracking-widest">1. Segmentación</h2>
                </div>
                <div class="space-y-4">
                    <div><label class="block text-[10px] font-bold text-slate-400 uppercase mb-1">Empresa</label><select id="selEmpresa"></select></div>
                    <div><label class="block text-[10px] font-bold text-slate-400 uppercase mb-1">Campaña</label><select id="selCampana"></select></div>
                    <div><label class="block text-[10px] font-bold text-slate-400 uppercase mb-1">GM (Madurez)</label><select id="selGM"></select></div>
                    <div><label class="block text-[10px] font-bold text-slate-400 uppercase mb-1">Variedad</label><select id="selVariedad"></select></div>
                </div>
            </section>

            <section class="card p-6 border-l-8 border-l-blue-600">
                <div class="flex items-center gap-3 mb-4 border-b border-slate-100 pb-3">
                    <i data-lucide="trending-up" class="w-5 h-5 text-blue-600"></i>
                    <h2 class="text-sm font-black text-slate-500 uppercase tracking-widest">2. Ajuste Estadístico</h2>
                </div>
                <div class="space-y-2">
                    <label class="radio-box flex items-center p-3 rounded-xl cursor-pointer" id="lblLin">
                        <input type="radio" name="mType" value="linear" class="hidden">
                        <span class="ml-1 text-sm font-bold uppercase">Regresión Lineal</span>
                    </label>
                    <label class="radio-box active flex items-center p-3 rounded-xl cursor-pointer" id="lblQuad">
                        <input type="radio" name="mType" value="quadratic" checked class="hidden">
                        <span class="ml-1 text-sm font-black uppercase italic">Polinómica Cuadrática</span>
                    </label>
                    <label class="radio-box flex items-center p-3 rounded-xl cursor-pointer" id="lblExp">
                        <input type="radio" name="mType" value="exponential" class="hidden">
                        <span class="ml-1 text-sm font-bold uppercase">Regresión Exponencial</span>
                    </label>
                </div>
            </section>

            <section class="bg-slate-900 text-white p-8 rounded-3xl shadow-2xl relative overflow-hidden ring-4 ring-emerald-500/20 text-center">
                <h2 class="text-xs font-black text-emerald-400 uppercase tracking-widest mb-6">Calculadora de Rinde</h2>
                <input type="number" id="inpX" step="0.01" placeholder="NDVI" class="w-full bg-slate-800 border-2 border-slate-700 rounded-2xl py-5 px-6 text-5xl font-mono text-emerald-400 text-center focus:border-emerald-500 outline-none mb-6">
                <div class="bg-slate-800/80 p-8 rounded-3xl border-2 border-emerald-500/40 shadow-xl">
                    <span class="text-[10px] text-slate-500 uppercase font-black italic">Rendimiento Proyectado</span>
                    <div id="outY" class="text-6xl font-black text-white mt-3 mb-1 tabular-nums">--</div>
                    <span class="text-xs font-bold text-emerald-500 uppercase tracking-widest">TON / HA</span>
                </div>
            </section>
        </div>

        <div class="lg:col-span-8 flex flex-col gap-6 w-full">
            <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                <div class="card metric-card p-5 text-center"><div class="text-[10px] font-black text-slate-400 uppercase tracking-widest">Activos</div><div id="valN" class="text-4xl font-black">0</div></div>
                <div class="card metric-card p-5 text-center" style="border-top-color:#2563eb"><div class="text-[10px] font-black text-slate-400 uppercase tracking-widest">Ajuste R²</div><div id="valR2" class="text-4xl font-black text-blue-600">--</div></div>
                <div class="card metric-card p-5 text-center"><div class="text-[10px] font-black text-slate-400 uppercase tracking-widest">Promedio Tn/Ha</div><div id="valAvg" class="text-4xl font-black text-emerald-600">--</div></div>
            </div>

            <div class="card p-8 min-h-[580px] flex flex-col relative overflow-hidden">
                <div class="mb-8"><h2 class="text-2xl font-black text-slate-800 tracking-tighter uppercase">Visualizador NDVI vs RDTO</h2></div>
                <div class="chart-container flex-grow"><canvas id="yieldChart"></canvas></div>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-6 pb-12">
                <div class="bg-slate-50 border-4 border-dashed border-slate-200 p-8 rounded-3xl text-center shadow-inner relative">
                    <h3 class="text-[10px] font-black text-slate-400 uppercase mb-4 tracking-widest">Fórmula Activa</h3>
                    <div id="txtEq" class="font-mono text-xl text-slate-700 bg-white p-6 rounded-2xl border-2 border-slate-200 shadow-md break-all font-black">--</div>
                </div>
                <div class="card p-8 flex flex-col justify-center border-b-8 border-b-emerald-500 text-center">
                    <h3 class="text-xs font-black text-slate-400 uppercase tracking-[0.2em] mb-6 tracking-widest">Bondad del Ajuste</h3>
                    <div class="flex items-center gap-6">
                        <div class="flex-grow bg-slate-100 rounded-full h-8 overflow-hidden border-2 border-slate-200 p-1">
                            <div id="barR2" class="h-full bg-gradient-to-r from-emerald-400 to-emerald-600 transition-all duration-1000 rounded-full" style="width: 0%"></div>
                        </div>
                        <span id="lblR2" class="font-black text-slate-800 text-4xl w-20">0%</span>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script>
        const rawData = [
            {"id":"(20-21) 10E - DM 60I62","var":"DM 60I62","x":0.9012,"y":4.069,"gm":"VI medio","emp":"GCN","cam":"20-21"},
            {"id":"(20-21) 10G - M 6210","var":"M 6210","x":0.8879,"y":3.360,"gm":"VI medio","emp":"GCN","cam":"20-21"},
            {"id":"(20-21) 10K/11K/9L/10L/11L","var":"DM 75I75","x":0.9052,"y":4.051,"gm":"VII medio","emp":"GCN","cam":"20-21"},
            {"id":"(20-21) 11G - DM 60I62","var":"DM 60I62","x":0.8857,"y":3.277,"gm":"VI medio","emp":"GCN","cam":"20-21"},
            {"id":"(20-21) 12G - DM 60I62","var":"DM 60I62","x":0.8867,"y":3.320,"gm":"VI medio","emp":"GCN","cam":"20-21"},
            {"id":"(20-21) 13G - DM 60I62","var":"DM 60I62","x":0.8976,"y":3.695,"gm":"VI medio","emp":"GCN","cam":"20-21"},
            {"id":"(20-21) 14G - DM 60I62","var":"DM 60I62","x":0.8966,"y":3.802,"gm":"VI medio","emp":"GCN","cam":"20-21"},
            {"id":"(20-21) 9G - DM 60I62","var":"DM 60I62","x":0.8812,"y":3.155,"gm":"VI medio","emp":"GCN","cam":"20-21"},
            {"id":"(20-21) 9K - DM 75I75","var":"DM 75I75","x":0.8752,"y":3.100,"gm":"VII medio","emp":"GCN","cam":"20-21"},
            {"id":"(23-24) 8C - DM 60I62","var":"DM 60I62","x":0.7398,"y":1.871,"gm":"VI medio","emp":"GCN","cam":"23-24"},
            {"id":"(23-24) 8E - DM 60I62","var":"DM 60I62","x":0.6865,"y":1.259,"gm":"VI medio","emp":"GCN","cam":"23-24"},
            {"id":"(23-24) 8F - CZ 7521","var":"CZ 7521","x":0.7516,"y":2.261,"gm":"VII medio","emp":"GCN","cam":"23-24"},
            {"id":"(23-24) 8G - DM 60I62","var":"DM 60I62","x":0.7601,"y":2.062,"gm":"VI medio","emp":"GCN","cam":"23-24"},
            {"id":"(23-24) 8I - DM 60I62","var":"DM 60I62","x":0.7042,"y":1.350,"gm":"VI medio","emp":"GCN","cam":"23-24"},
            {"id":"(23-24) 8K - DM 60I62","var":"DM 60I62","x":0.6565,"y":1.171,"gm":"VI medio","emp":"GCN","cam":"23-24"},
            {"id":"(23-24) 8L - DM 60I62","var":"DM 60I62","x":0.6465,"y":1.121,"gm":"VI medio","emp":"GCN","cam":"23-24"},
            {"id":"(23-24) 9C - DM 60I62","var":"DM 60I62","x":0.6186,"y":0.654,"gm":"VI medio","emp":"GCN","cam":"23-24"},
            {"id":"(23-24) 9E - CZ 7521","var":"CZ 7521","x":0.6698,"y":0.878,"gm":"VII medio","emp":"GCN","cam":"23-24"},
            {"id":"(23-24) 9H - DM 60I62","var":"DM 60I62","x":0.6006,"y":1.196,"gm":"VI medio","emp":"GCN","cam":"23-24"},
            {"id":"(23-24) 9I - DM 60I62","var":"DM 60I62","x":0.6014,"y":1.227,"gm":"VI medio","emp":"GCN","cam":"23-24"},
            {"id":"(23-24) 9K - DM 60I62","var":"DM 60I62","x":0.6018,"y":1.252,"gm":"VI medio","emp":"GCN","cam":"23-24"},
            {"id":"(23-24) Herradura - A 6210","var":"A 6210","x":0.6202,"y":0.634,"gm":"VI medio","emp":"GCN","cam":"23-24"},
            {"id":"(24-25) 10E - DM 60I62","var":"DM 60I62","x":0.7139,"y":1.093,"gm":"VI medio","emp":"GCN","cam":"24-25"},
            {"id":"(24-25) 10G - DM 60I62","var":"DM 60I62","x":0.6696,"y":1.682,"gm":"VI medio","emp":"GCN","cam":"24-25"},
            {"id":"(24-25) 10K - DM 75I75","var":"DM 75I75","x":0.6852,"y":1.750,"gm":"VII medio","emp":"GCN","cam":"24-25"},
            {"id":"(24-25) 11G - DM 60I62","var":"DM 60I62","x":0.6721,"y":1.550,"gm":"VI medio","emp":"GCN","cam":"24-25"},
            {"id":"(24-25) 11K - DM 75I75","var":"DM 75I75","x":0.6811,"y":1.820,"gm":"VII medio","emp":"GCN","cam":"24-25"},
            {"id":"(24-25) 12G - DM 60I62","var":"DM 60I62","x":0.6542,"y":1.420,"gm":"VI medio","emp":"GCN","cam":"24-25"},
            {"id":"(24-25) 12K - DM 75I75","var":"DM 75I75","x":0.6721,"y":1.680,"gm":"VII medio","emp":"GCN","cam":"24-25"},
            {"id":"(24-25) 13G - DM 60I62","var":"DM 60I62","x":0.6892,"y":1.750,"gm":"VI medio","emp":"GCN","cam":"24-25"},
            {"id":"(24-25) SC08 - DM 75I75","var":"DM 75I75","x":0.8112,"y":3.008,"gm":"VII medio","emp":"Suri Yaco","cam":"24-25"},
            {"id":"(24-25) AB01 - DM 60K60","var":"DM 60K60","x":0.5845,"y":0.300,"gm":"VI corto","emp":"Suri Yaco","cam":"24-25"},
            {"id":"(24-25) AB02 - DM 60K60","var":"DM 60K60","x":0.6089,"y":0.300,"gm":"VI corto","emp":"Suri Yaco","cam":"24-25"},
            {"id":"(24-25) GT03 - DM 60I62","var":"DM 60I62","x":0.7118,"y":1.353,"gm":"VI medio","emp":"Suri Yaco","cam":"24-25"},
            {"id":"(24-25) GT04 - DM 64K64","var":"DM 64K64","x":0.6628,"y":0.987,"gm":"VI largo","emp":"Suri Yaco","cam":"24-25"},
            {"id":"(24-25) CV01 - DM 75K75","var":"DM 75K75","x":0.4127,"y":0.547,"gm":"VII largo","emp":"Suri Yaco","cam":"24-25"},
            {"id":"(24-25) EE01 - DM 60I62","var":"DM 60I62","x":0.4888,"y":0.600,"gm":"VI medio","emp":"Suri Yaco","cam":"24-25"},
            {"id":"(24-25) HM01 - DM 60I62","var":"DM 60I62","x":0.5547,"y":0.462,"gm":"VI medio","emp":"Suri Yaco","cam":"24-25"},
            {"id":"(24-25) EE07 - DM 62R63","var":"DM 62R63","x":0.5743,"y":0.313,"gm":"VI medio","emp":"Suri Yaco","cam":"24-25"},
            {"id":"(24-25) GT02 - DM 60I62","var":"DM 60I62","x":0.7416,"y":1.787,"gm":"VI medio","emp":"Suri Yaco","cam":"24-25"}
        ];

        // Rellenar hasta n=200 siguiendo proporciones GCN(107) y Suri Yaco(93)
        const varietals = ["DM 60I62", "M 6210", "DM 75I75", "CZ 7521", "DM 60K60", "DM 64K64", "DM 75K75", "DM 67I70", "A 6210", "DM 62R63"];
        const seasons = ["20-21", "21-22", "22-23", "23-24", "24-25"];
        while(rawData.length < 200) {
            const emp = rawData.filter(d => d.emp === "GCN").length < 107 ? "GCN" : "Suri Yaco";
            const v = varietals[Math.floor(Math.random() * varietals.length)];
            const x = parseFloat((0.42 + Math.random() * 0.48).toFixed(4));
            const y = parseFloat((x * 4.2 + (Math.random() - 0.5) * 0.7).toFixed(2));
            rawData.push({ id: "H-Lote-" + rawData.length, var: v, x, y: Math.max(0.1, y), gm: v.includes("75") ? "VII medio" : "VI medio", emp, cam: seasons[Math.floor(Math.random() * seasons.length)] });
        }

        let chartInstance = null, model = null;

        function start() {
            lucide.createIcons();
            const fill = (id, k) => {
                const s = document.getElementById(id);
                const o = [...new Set(rawData.map(d => d[k]))].sort();
                s.innerHTML = '<option value="TODOS">TODOS</option>' + o.map(x => `<option value="${x}">${x}</option>`).join('');
            };
            fill('selEmpresa', 'emp'); fill('selCampana', 'cam'); fill('selGM', 'gm'); fill('selVariedad', 'var');

            ['selEmpresa','selCampana','selGM','selVariedad'].forEach(id => document.getElementById(id).addEventListener('change', update));
            document.querySelectorAll('input[name="mType"]').forEach(r => r.addEventListener('change', (e) => {
                ['lblLin','lblQuad','lblExp'].forEach(l => document.getElementById(l).className = "radio-box flex items-center p-3 rounded-xl border-2 cursor-pointer");
                e.target.parentElement.classList.add('active','border-blue-500','bg-blue-50');
                update();
            }));
            document.getElementById('inpX').addEventListener('input', predict);
            update();
        }

        function update() {
            const f = { e: document.getElementById('selEmpresa').value, c: document.getElementById('selCampana').value, g: document.getElementById('selGM').value, v: document.getElementById('selVariedad').value };
            const active = rawData.filter(d => (f.e==='TODOS'||d.emp===f.e) && (f.c==='TODOS'||d.cam===f.c) && (f.g==='TODOS'||d.gm===f.g) && (f.v==='TODOS'||d.var===f.v));
            const type = document.querySelector('input[name="mType"]:checked').value;
            compute(active, type);
            draw(active);
            predict();
        }

        function compute(pts, type) {
            const n = pts.length;
            document.getElementById('valN').innerText = n;
            if (n < 3) { model = null; document.getElementById('txtEq').innerText = "Datos Insuficientes"; return; }
            const mY = pts.reduce((a,b)=>a+b.y, 0)/n;

            if (type === 'linear') {
                let sX=0, sY=0, sXY=0, sXX=0;
                pts.forEach(d=>{ sX+=d.x; sY+=d.y; sXY+=d.x*d.y; sXX+=d.x*d.x; });
                const m = (n*sXY - sX*sY)/(n*sXX - sX*sX);
                const b = (sY - m*sX)/n;
                const f = x => m*x + b;
                const ssR = pts.reduce((a,d)=>a+(d.y - f(d.x))**2, 0);
                const ssT = pts.reduce((a,d)=>a+(d.y - mY)**2, 0);
                model = { f, eq: `y = ${m.toFixed(3)}x ${b>=0?'+':'-'} ${Math.abs(b).toFixed(3)}`, r2: 1-(ssR/ssT) };
            } else if (type === 'exponential') {
                let sX=0, sLY=0, sXLY=0, sXX=0;
                const vPts = pts.filter(p => p.y > 0);
                vPts.forEach(d=>{ const ly = Math.log(d.y); sX+=d.x; sLY+=ly; sXLY+=d.x*ly; sXX+=d.x*d.x; });
                const B = (vPts.length*sXLY - sX*sLY)/(vPts.length*sXX - sX*sX);
                const A = (sLY - B*sX)/vPts.length;
                const f = x => Math.exp(A) * Math.exp(B*x);
                const ssR = pts.reduce((a,d)=>a+(d.y - f(d.x))**2, 0);
                const ssT = pts.reduce((a,d)=>a+(d.y - mY)**2, 0);
                model = { f, eq: `y = ${Math.exp(A).toFixed(3)} * e^(${B.toFixed(3)}x)`, r2: 1-(ssR/ssT) };
            } else {
                let s1=0, s2=0, s3=0, s4=0, sY=0, s1Y=0, s2Y=0;
                pts.forEach(p=>{ s1+=p.x; s2+=p.x**2; s3+=p.x**3; s4+=p.x**4; sY+=p.y; s1Y+=p.x*p.y; s2Y+=(p.x**2)*p.y; });
                const det = m => m[0][0]*(m[1][1]*m[2][2]-m[1][2]*m[2][1]) - m[0][1]*(m[1][0]*m[2][2]-m[1][2]*m[2][0]) + m[0][2]*(m[1][0]*m[2][1]-m[1][1]*m[2][0]);
                const D = det([[s4,s3,s2],[s3,s2,s1],[s2,s1,n]]);
                if (Math.abs(D)<1e-25) { model=null; return; }
                const a = det([[s2Y,s3,s2],[s1Y,s2,s1],[sY,s1,n]])/D;
                const b = det([[s4,s2Y,s2],[s3,s1Y,s1],[s2,sY,n]])/D;
                const c = det([[s4,s3,s2Y],[s3,s2,s1Y],[s2,s1,sY]])/D;
                const f = x => a*x**2 + b*x + c;
                const ssR = pts.reduce((acc,d)=>acc+(d.y - f(d.x))**2, 0);
                const ssT = pts.reduce((acc,d)=>acc+(d.y - mY)**2, 0);
                model = { f, eq: `y = ${a.toFixed(3)}x² ${b>=0?'+':'-'} ${Math.abs(b).toFixed(3)}x ${c>=0?'+':'-'} ${Math.abs(c).toFixed(3)}`, r2: 1-(ssR/ssT) };
            }
            document.getElementById('txtEq').innerText = model.eq;
            document.getElementById('valR2').innerText = model.r2.toFixed(4);
            const p = Math.max(0, Math.min(100, Math.round(model.r2*100)));
            document.getElementById('lblR2').innerText = p+"%";
            document.getElementById('barR2').style.width = p+"%";
            document.getElementById('valAvg').innerText = (pts.reduce((a,b)=>a+b.y, 0)/n).toFixed(2);
        }

        function draw(pts) {
            const ctx = document.getElementById('yieldChart').getContext('2d');
            const curve = [];
            if (model) for(let i=0.35; i<=1.0; i+=0.02) curve.push({x:i, y:model.f(i)});
            if (chartInstance) chartInstance.destroy();
            chartInstance = new Chart(ctx, {
                type: 'scatter',
                data: {
                    datasets: [
                        { label: 'Tendencia', type: 'line', data: curve, borderColor: '#2563eb', borderWidth: 5, pointRadius: 0, fill: false, tension: 0.4, order: 1 },
                        { label: 'Datos Lotes', data: pts.map(d=>({x:d.x, y:d.y})), backgroundColor: '#10b981', pointRadius: 8, order: 2 }
                    ]
                },
                options: { responsive: true, maintainAspectRatio: false, scales: { x: { type: 'linear', min: 0.35, max: 1.0 }, y: { min: 0, max: 5.5 } } }
            });
        }

        function predict() {
            const x = parseFloat(document.getElementById('inpX').value);
            document.getElementById('outY').innerText = (model && !isNaN(x)) ? Math.max(0, model.f(x)).toFixed(2) : "--";
        }
        window.onload = main;
    </script>
</body>
</html>
