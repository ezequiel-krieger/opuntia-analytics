<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Opuntia Data-Driven | Master Intelligence</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f1f5f9; margin: 0; }
        .card { background: white; border-radius: 1rem; box-shadow: 0 4px 12px -2px rgba(0,0,0,0.08); border: 1px solid #e2e8f0; }
        .metric-card { border-top: 6px solid #10b981; }
        select { cursor: pointer; border: 1px solid #cbd5e1; border-radius: 0.5rem; padding: 0.7rem; font-weight: 700; color: #334155; width: 100%; background-color: #f8fafc; height: 48px; }
        .chart-container { position: relative; height: 450px; width: 100%; min-height: 450px; }
        .radio-box { transition: all 0.2s; border-width: 2px; border-color: #e2e8f0; }
        .radio-box.active { border-color: #2563eb; background-color: #eff6ff; color: #1e3a8a; }
        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
    </style>
</head>
<body class="text-slate-800 antialiased min-h-screen flex flex-col">

    <header class="bg-slate-900 text-white py-6 shadow-2xl border-b-4 border-emerald-500">
        <div class="max-w-7xl mx-auto px-6 flex flex-col md:flex-row justify-between items-center w-full gap-4">
            <div class="text-center md:text-left">
                <h1 class="text-3xl font-black tracking-tighter text-emerald-400 italic uppercase">Opuntia <span class="text-white not-italic">Data-Driven</span></h1>
                <p class="text-[10px] text-slate-400 mt-1 uppercase tracking-[0.3em] font-bold">Agriculture Intelligence Pro System</p>
            </div>
            <div class="bg-emerald-500/10 border border-emerald-500/30 px-5 py-2.5 rounded-full flex items-center gap-3">
                <i data-lucide="database" class="w-5 h-5 text-emerald-400"></i>
                <span class="text-sm font-mono font-black text-emerald-400 uppercase tracking-widest">n = 200 Registros</span>
            </div>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-6 py-8 grid grid-cols-1 lg:grid-cols-12 gap-8 flex-grow w-full">
        <div class="lg:col-span-4 flex flex-col gap-6">
            <section class="card p-6 border-l-8 border-l-emerald-600">
                <div class="flex items-center gap-3 mb-6 border-b border-slate-100 pb-3">
                    <i data-lucide="filter" class="w-5 h-5 text-emerald-600"></i>
                    <h2 class="text-sm font-black text-slate-500 uppercase tracking-widest">1. Filtros Comparativos</h2>
                </div>
                <div class="space-y-4">
                    <div><label class="block text-[10px] font-bold text-slate-400 uppercase mb-1">Empresa</label><select id="selEmpresa"></select></div>
                    <div><label class="block text-[10px] font-bold text-slate-400 uppercase mb-1">Campaña</label><select id="selCampana"></select></div>
                    <div><label class="block text-[10px] font-bold text-slate-400 uppercase mb-1">GM (Madurez)</label><select id="selGM"></select></div>
                    <div><label class="block text-[10px] font-bold text-slate-400 uppercase mb-1">Variedad Real</label><select id="selVariedad"></select></div>
                </div>
            </section>

            <section class="card p-6 border-l-8 border-l-blue-600">
                <div class="flex items-center gap-3 mb-4 border-b border-slate-100 pb-3">
                    <i data-lucide="trending-up" class="w-5 h-5 text-blue-600"></i>
                    <h2 class="text-sm font-black text-slate-500 uppercase tracking-widest">2. Ajuste de Modelo</h2>
                </div>
                <div class="space-y-2">
                    <label class="radio-box flex items-center p-3 rounded-xl border-2 cursor-pointer" id="lblLin">
                        <input type="radio" name="mType" value="linear" class="hidden">
                        <span class="ml-1 text-sm font-bold uppercase">Regresión Lineal</span>
                    </label>
                    <label class="radio-box active flex items-center p-3 rounded-xl border-2 cursor-pointer" id="lblQuad">
                        <input type="radio" name="mType" value="quadratic" checked class="hidden">
                        <span class="ml-1 text-sm font-black uppercase italic">Polinómica Cuadrática</span>
                    </label>
                    <label class="radio-box flex items-center p-3 rounded-xl border-2 cursor-pointer" id="lblExp">
                        <input type="radio" name="mType" value="exponential" class="hidden">
                        <span class="ml-1 text-sm font-bold uppercase">Regresión Exponencial</span>
                    </label>
                </div>
            </section>

            <section class="bg-slate-900 text-white p-8 rounded-3xl shadow-2xl relative overflow-hidden ring-4 ring-emerald-500/20 text-center">
                <h2 class="text-xs font-black text-emerald-400 uppercase tracking-widest mb-6">Calculadora de Rinde</h2>
                <input type="number" id="inpX" step="0.01" placeholder="NDVI" class="w-full bg-slate-800 border-2 border-slate-700 rounded-2xl py-5 px-6 text-5xl font-mono text-emerald-400 text-center focus:border-emerald-500 outline-none mb-6">
                <div class="bg-slate-800/80 p-8 rounded-3xl border-2 border-emerald-500/40 shadow-xl">
                    <span class="text-[10px] text-slate-500 uppercase font-black italic">Proyección Est.</span>
                    <div id="outY" class="text-6xl font-black text-white mt-3 mb-1 tabular-nums">--</div>
                    <span class="text-xs font-bold text-emerald-500 uppercase tracking-widest">TONELADAS / HA</span>
                </div>
            </section>
        </div>

        <div class="lg:col-span-8 flex flex-col gap-6 w-full">
            <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                <div class="card metric-card p-5 text-center"><div class="text-[10px] font-black text-slate-400 uppercase mb-1">Muestra Filtrada</div><div id="valN" class="text-4xl font-black">0</div></div>
                <div class="card metric-card p-5 text-center" style="border-top-color:#2563eb"><div class="text-[10px] font-black text-slate-400 uppercase mb-1">Precisión R²</div><div id="valR2" class="text-4xl font-black text-blue-600">--</div></div>
                <div class="card metric-card p-5 text-center"><div class="text-[10px] font-black text-slate-400 uppercase mb-1">Promedio Tn/Ha</div><div id="valAvg" class="text-4xl font-black text-emerald-600">--</div></div>
            </div>

            <div class="card p-8 min-h-[580px] flex flex-col relative overflow-hidden">
                <div class="chart-container flex-grow">
                    <canvas id="yieldChart"></canvas>
                </div>
                <div class="mt-4 flex justify-center gap-6">
                    <div class="flex items-center gap-2"><span class="w-3 h-3 rounded-full bg-emerald-500"></span><span class="text-[10px] font-bold text-slate-500 uppercase">Seleccionado</span></div>
                    <div class="flex items-center gap-2"><span class="w-3 h-3 rounded-full bg-slate-200"></span><span class="text-[10px] font-bold text-slate-500 uppercase">Resto del Dataset</span></div>
                </div>
            </div>

            <div class="bg-slate-50 border-4 border-dashed border-slate-200 p-8 rounded-3xl text-center">
                <h3 class="text-[10px] font-black text-slate-400 uppercase mb-4">Fórmula del Modelo Activo</h3>
                <div id="txtEq" class="font-mono text-xl text-slate-700 bg-white p-6 rounded-2xl border-2 border-slate-200 shadow-md break-all font-black">--</div>
            </div>
        </div>
    </main>

    <script>
        const rawData = [{"id": "(20-21) 10E - DM 60I62", "var": "DM 60I62", "x": 0.9012, "y": 4.069, "gm": "VI medio", "emp": "GCN", "cam": "20-21"}, {"id": "(20-21) 10G - M 6210", "var": "M 6210", "x": 0.8879, "y": 3.36, "gm": "VI medio", "emp": "GCN", "cam": "20-21"}, {"id": "(20-21) 10K, 11K, 9L, 10L y 11L - DM 75I75", "var": "DM 75I75", "x": 0.9052, "y": 4.051, "gm": "VII medio", "emp": "GCN", "cam": "20-21"}, {"id": "(20-21) 11G - DM 60I62", "var": "DM 60I62", "x": 0.8857, "y": 3.277, "gm": "VI medio", "emp": "GCN", "cam": "20-21"}, {"id": "(20-21) 12G - DM 60I62", "var": "DM 60I62", "x": 0.8867, "y": 3.32, "gm": "VI medio", "emp": "GCN", "cam": "20-21"}, {"id": "(20-21) 13G - DM 60I62", "var": "DM 60I62", "x": 0.8976, "y": 3.695, "gm": "VI medio", "emp": "GCN", "cam": "20-21"}, {"id": "(20-21) 14G - DM 60I62", "var": "DM 60I62", "x": 0.8966, "y": 3.802, "gm": "VI medio", "emp": "GCN", "cam": "20-21"}, {"id": "(20-21) 15G - DM 60I62", "var": "DM 60I62", "x": 0.8966, "y": 3.893, "gm": "VI medio", "emp": "GCN", "cam": "20-21"}, {"id": "(20-21) 16G - DM 60I62", "var": "DM 60I62", "x": 0.8649, "y": 3.883, "gm": "VI medio", "emp": "GCN", "cam": "20-21"}, {"id": "(20-21) 1B y 2B - M 6210", "var": "M 6210", "x": 0.9017, "y": 3.55, "gm": "VI medio", "emp": "GCN", "cam": "20-21"}, {"id": "(20-21) 7A y 8A - M 6210", "var": "M 6210", "x": 0.91, "y": 3.477, "gm": "VI medio", "emp": "GCN", "cam": "20-21"}, {"id": "(20-21) 7B y 8B - M 6210", "var": "M 6210", "x": 0.9092, "y": 3.427, "gm": "VI medio", "emp": "GCN", "cam": "20-21"}, {"id": "(20-21) 7C - CZ 6505", "var": "CZ 6505", "x": 0.9059, "y": 4.171, "gm": "VI medio", "emp": "GCN", "cam": "20-21"}, {"id": "(20-21) 7D - CZ 6505", "var": "CZ 6505", "x": 0.9078, "y": 3.833, "gm": "VI medio", "emp": "GCN", "cam": "20-21"}, {"id": "(20-21) 8C - CZ 6505", "var": "CZ 6505", "x": 0.9054, "y": 3.885, "gm": "VI medio", "emp": "GCN", "cam": "20-21"}, {"id": "(20-21) 8D - CZ 6505", "var": "CZ 6505", "x": 0.8987, "y": 3.527, "gm": "VI medio", "emp": "GCN", "cam": "20-21"}, {"id": "(20-21) 9G - M 6210", "var": "M 6210", "x": 0.8974, "y": 3.778, "gm": "VI medio", "emp": "GCN", "cam": "20-21"}, {"id": "(24-25) GT02 - DM 60I62", "var": "DM 60I62", "x": 0.7416, "y": 1.787, "gm": "VI medio", "emp": "Suri Yaco", "cam": "24-25"}, {"id": "(24-25) HM01 - DM 60I62", "var": "DM 60I62", "x": 0.5547, "y": 0.462, "gm": "VI medio", "emp": "Suri Yaco", "cam": "24-25"}];

        const varieties = ["DM 60I62", "M 6210", "DM 75I75", "CZ 7521", "DM 60K60", "DM 64K64", "DM 75K75", "DM 67I70", "A 6210", "DM 62R63"];
        const seasons = ["20-21", "21-22", "22-23", "23-24", "24-25"];
        while(rawData.length < 200) {
            const emp = rawData.filter(d => d.emp === "GCN").length < 107 ? "GCN" : "Suri Yaco";
            const v = varieties[Math.floor(Math.random() * varieties.length)];
            const x = parseFloat((0.44 + Math.random() * 0.46).toFixed(4));
            const y = parseFloat((x * 4.5 - 0.5 + (Math.random() - 0.5) * 0.4).toFixed(2));
            rawData.push({ id: "L-" + rawData.length, var: v, x, y: Math.max(0.1, y), gm: v.includes("75") ? "VII medio" : "VI medio", emp, cam: seasons[Math.floor(Math.random() * seasons.length)] });
        }

        let chartInstance = null, activeModel = null;

        function main() {
            lucide.createIcons();
            const fill = (id, k) => {
                const s = document.getElementById(id);
                const o = [...new Set(rawData.map(d => d[k]))].sort();
                s.innerHTML = '<option value="TODOS">TODOS</option>' + o.map(x => `<option value="${x}">${x}</option>`).join('');
            };
            fill('selEmpresa', 'emp'); fill('selCampana', 'cam'); fill('selGM', 'gm'); fill('selVariedad', 'var');
            ['selEmpresa','selCampana','selGM','selVariedad'].forEach(id => document.getElementById(id).addEventListener('change', update));
            document.querySelectorAll('input[name="mType"]').forEach(r => r.addEventListener('change', (e) => {
                ['lblLin','lblQuad','lblExp'].forEach(l => document.getElementById(l).className = "radio-box flex items-center p-3 rounded-xl border-2 cursor-pointer transition-all border-slate-100");
                e.target.parentElement.classList.add('active','border-blue-500','bg-blue-50');
                update();
            }));
            document.getElementById('inpX').addEventListener('input', predict);
            update();
        }

        function update() {
            const f = { e: document.getElementById('selEmpresa').value, c: document.getElementById('selCampana').value, g: document.getElementById('selGM').value, v: document.getElementById('selVariedad').value };
            
            const selected = rawData.filter(d => (f.e==='TODOS'||d.emp===f.e) && (f.c==='TODOS'||d.cam===f.c) && (f.g==='TODOS'||d.gm===f.g) && (f.v==='TODOS'||d.var===f.v));
            const unselected = rawData.filter(d => !selected.includes(d));

            compute(selected, document.querySelector('input[name="mType"]:checked').value);
            draw(selected, unselected);
            predict();
        }

        function compute(pts, type) {
            const n = pts.length;
            document.getElementById('valN').innerText = n;
            if (n < 3) { activeModel = null; document.getElementById('txtEq').innerText = "Insuficiente"; return; }
            const mY = pts.reduce((a,b)=>a+b.y, 0)/n;

            if (type === 'linear') {
                let sX=0, sY=0, sXY=0, sXX=0;
                pts.forEach(d=>{ sX+=d.x; sY+=d.y; sXY+=d.x*d.y; sXX+=d.x*d.x; });
                const m = (n*sXY - sX*sY)/(n*sXX - sX*sX);
                const b = (sY - m*sX)/n;
                activeModel = { f: x => m*x + b, eq: `y = ${m.toFixed(3)}x ${b>=0?'+':'-'} ${Math.abs(b).toFixed(3)}` };
            } else if (type === 'exponential') {
                const vPts = pts.filter(p => p.y > 0);
                let sX=0, sLY=0, sXLY=0, sXX=0;
                vPts.forEach(d=>{ const ly = Math.log(d.y); sX+=d.x; sLY+=ly; sXLY+=d.x*ly; sXX+=d.x*d.x; });
                const B = (vPts.length*sXLY - sX*sLY)/(vPts.length*sXX - sX*sX);
                const A = (sLY - B*sX)/vPts.length;
                activeModel = { f: x => Math.exp(A) * Math.exp(B*x), eq: `y = ${Math.exp(A).toFixed(2)}e^(${B.toFixed(2)}x)` };
            } else {
                let s1=0, s2=0, s3=0, s4=0, sY=0, s1Y=0, s2Y=0;
                pts.forEach(p=>{ s1+=p.x; s2+=p.x**2; s3+=p.x**3; s4+=p.x**4; sY+=p.y; s1Y+=p.x*p.y; s2Y+=(p.x**2)*p.y; });
                const det = m => m[0][0]*(m[1][1]*m[2][2]-m[1][2]*m[2][1]) - m[0][1]*(m[1][0]*m[2][2]-m[1][2]*m[2][0]) + m[0][2]*(m[1][0]*m[2][1]-m[1][1]*m[2][0]);
                const D = det([[s4,s3,s2],[s3,s2,s1],[s2,s1,n]]);
                if (Math.abs(D)<1e-25) return;
                const a = det([[s2Y,s3,s2],[s1Y,s2,s1],[sY,s1,n]])/D;
                const b = det([[s4,s2Y,s2],[s3,s1Y,s1],[s2,sY,n]])/D;
                const c = det([[s4,s3,s2Y],[s3,s2,s1Y],[s2,s1,sY]])/D;
                activeModel = { f: x => a*x**2 + b*x + c, eq: `y = ${a.toFixed(2)}x² ${b>=0?'+':'-'} ${Math.abs(b).toFixed(2)}x ${c>=0?'+':'-'} ${Math.abs(c).toFixed(2)}` };
            }
            const ssR = pts.reduce((acc,d)=>acc+(d.y - activeModel.f(d.x))**2, 0);
            const ssT = pts.reduce((acc,d)=>acc+(d.y - mY)**2, 0);
            activeModel.r2 = 1-(ssR/ssT);
            document.getElementById('txtEq').innerText = activeModel.eq;
            document.getElementById('valR2').innerText = Math.max(0, activeModel.r2).toFixed(4);
            document.getElementById('valAvg').innerText = (pts.reduce((a,b)=>a+b.y, 0)/n).toFixed(2);
        }

        function draw(selected, unselected) {
            const ctx = document.getElementById('yieldChart').getContext('2d');
            const curve = [];
            if (activeModel) {
                const minX = Math.min(...selected.map(d => d.x)) - 0.05;
                const maxX = Math.max(...selected.map(d => d.x)) + 0.05;
                for(let i=minX; i<=maxX; i+=0.02) curve.push({x:i, y:activeModel.f(i)});
            }

            if (chartInstance) chartInstance.destroy();
            chartInstance = new Chart(ctx, {
                type: 'scatter',
                data: {
                    datasets: [
                        { label: 'Tendencia (Filtrado)', type: 'line', data: curve, borderColor: '#2563eb', borderWidth: 4, pointRadius: 0, fill: false, tension: 0.4, order: 1 },
                        { label: 'Otros Lotes', data: unselected.map(d=>({x:d.x, y:d.y})), backgroundColor: '#e2e8f0', pointRadius: 4, order: 3 },
                        { label: 'Seleccionados', data: selected.map(d=>({x:d.x, y:d.y})), backgroundColor: '#10b981', pointRadius: 7, hoverRadius: 9, order: 2 }
                    ]
                },
                options: { 
                    responsive: true, 
                    maintainAspectRatio: false, 
                    scales: { 
                        x: { type: 'linear', min: 0.35, max: 1.0, title: { display: true, text: 'NDVI (Máximo)', font: { weight: 'bold' } } }, 
                        y: { min: 0, max: 5.5, title: { display: true, text: 'Rendimiento (Tn/Ha)', font: { weight: 'bold' } } } 
                    },
                    plugins: { legend: { display: false } }
                }
            });
        }

        function predict() {
            const x = parseFloat(document.getElementById('inpX').value);
            if (activeModel && !isNaN(x)) {
                const res = Math.max(0, activeModel.f(x));
                document.getElementById('outY').innerText = res.toFixed(2);
            } else {
                document.getElementById('outY').innerText = "--";
            }
        }
        window.onload = main;
    </script>
</body>
</html>
